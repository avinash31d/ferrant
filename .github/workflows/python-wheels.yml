name: Python wheels

on:
  pull_request:
  push:
    tags: ["python-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: Wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path python-wrapper/Cargo.toml
          manylinux: off
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/python-v')
    needs: wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ferrant/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
